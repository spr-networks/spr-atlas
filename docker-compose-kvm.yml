# KVM-isolated deployment using crun's libkrun handler. The base service
# remains in docker-compose.yml so image and capability settings cannot drift.
#
# Atlas needs raw ICMP, so krun gives the guest a real virtio-net interface.
# The runtime bridges its TAP into the service's private Docker network, where
# SPR CoreDHCP owns the guest's address, gateway, DNS and policy.
services:
  spr-atlas:
    extends:
      file: docker-compose.yml
      service: spr-atlas
    image: ghcr.io/spr-networks/spr-atlas:latest
    runtime: ${ATLAS_RUNTIME:-spr-krun}
    annotations:
      krun.cpus: "${ATLAS_KRUN_CPUS:-1}"
      krun.ram_mib: "${ATLAS_KRUN_RAM_MIB:-128}"
      krun.tap_name: "kruntap0"
      krun.net_uplink: "eth0"
      krun.vsock_path: "/state/plugins/spr-atlas/api/socket.sock"
      krun.vsock_port: "4040"
    environment:
      SPR_KRUN_PLUGIN_SOCKET: "/run/spr-krun-plugin/spr-atlas.sock"
      SPR_KRUN_VSOCK_PORT: "4040"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      # A dedicated nested bind makes Docker create the socket's parent before
      # libkrun starts (including on a first-time UI installation).
      - "${SUPERDIR:-/home/spr/super}/state/plugins/spr-atlas/api:/state/plugins/spr-atlas/api"

networks:
  atlasnet:
    name: spr-atlas
    driver_opts:
      com.docker.network.bridge.name: spr-atlas
