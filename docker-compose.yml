x-labels:
  &default-labels
  # constant (not $CI) so digests are reproducible across CI/local
  org.supernetworks.ci: "true"
  org.supernetworks.version: ${RELEASE_VERSION:-latest}${RELEASE_CHANNEL:-}

services:
  spr-atlas:
    container_name: spr-atlas
    image: ghcr.io/spr-networks/spr-atlas:${RELEASE_VERSION:-latest}${RELEASE_CHANNEL:-}
    build:
      context: "${BUILDCTX:-.}"
      labels: *default-labels
    # Used as the ssh key comment when the probe keypair is generated.
    hostname: spr-atlas
    # NET_RAW: the RIPE Atlas measurement engine (busybox: evping/evtraceroute)
    # opens raw ICMP sockets for ping and traceroute measurements. The probe
    # itself runs as an unprivileged user; startup grants only the net_raw
    # ambient capability to the probe process tree. NET_ADMIN is NOT needed:
    # the probe never creates interfaces, routes or firewall rules.
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    networks:
      atlasnet:
    volumes:
      - "${SUPERDIR:-/home/spr/super}/state/plugins/spr-atlas:/state/plugins/spr-atlas"
      # Probe identity (ssh keypair) + config: survives rebuilds/upgrades.
      - "${SUPERDIR:-/home/spr/super}/state/plugins/spr-atlas/etc:/etc/ripe-atlas"
      # Probe working/spool dir (measurement queues, crontabs).
      - "${SUPERDIR:-/home/spr/super}/state/plugins/spr-atlas/spool:/var/spool/ripe-atlas"

# Diagnostic runc/gVisor network. Production krun uses the katlas0 TAP
# declared in docker-compose-krun.yml and plugin.json instead.
networks:
  atlasnet:
    name: spr-atlas
    driver_opts:
      com.docker.network.bridge.name: spr-atlas
